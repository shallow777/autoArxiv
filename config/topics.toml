[digest]
project_name = "Auto arXiv Digest - NLP Agent Skill Memory Evolve"
lookback_days = 2
max_papers_per_run = 5
max_candidates = 120
language = "zh-CN"

[[topics]]
name = "NLP Agent Skill Memory Evolve"
categories = ["cs.CL", "cs.AI", "cs.LG"]
include_keywords = [
  "large language model",
  "llm",
  "agent",
  "ai agent",
  "autonomous agent",
  "tool agent",
  "tool use",
  "function calling",
  "skill",
  "skills",
  "memory",
  "long-term memory",
  "episodic memory",
  "retrieval memory",
  "agentic",
  "planning",
  "multi-agent",
  "evolve",
  "evolution",
  "self-evolving",
  "self-improving",
  "adaptive agent",
  "language agent",
  "text-based agent",
]
exclude_keywords = [
  "survey request for papers",
  "vision-language",
  "video-language",
  "image generation",
  "speech recognition",
  "text-to-image",
]
required_keyword_groups = [
  ["agent", "ai agent", "autonomous agent", "agentic", "multi-agent"],
  ["skill", "skills", "memory", "long-term memory", "episodic memory", "retrieval memory", "tool use", "function calling", "planning", "evolve", "evolution", "self-evolving", "self-improving", "adaptive agent"],
]
