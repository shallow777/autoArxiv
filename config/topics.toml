[digest]
project_name = "Auto arXiv Digest - Agent Memory/RL First, NLP Fallback"
target_day_offset = 1
max_papers_per_run = 5
max_candidates = 120
language = "zh-CN"
timezone = "Asia/Shanghai"

[[topics]]
name = "Agent Skill Memory RL Evolve"
categories = ["cs.CL", "cs.AI", "cs.LG"]
include_keywords = [
  "agent",
  "ai agent",
  "autonomous agent",
  "tool agent",
  "tool use",
  "function calling",
  "skill",
  "skills",
  "memory",
  "long-term memory",
  "episodic memory",
  "retrieval memory",
  "agentic",
  "planning",
  "multi-agent",
  "reinforcement learning",
  "rl",
  "policy optimization",
  "policy gradient",
  "actor-critic",
  "q-learning",
  "offline rl",
  "reward model",
  "reward shaping",
  "decision making",
  "exploration",
  "credit assignment",
  "evolve",
  "evolution",
  "self-evolving",
  "self-improving",
  "adaptive agent",
  "language agent",
  "text-based agent",
]
exclude_keywords = [
  "survey request for papers",
  "vision-language",
  "video-language",
  "image generation",
  "speech recognition",
  "text-to-image",
]
required_keyword_groups = [
  ["agent", "ai agent", "autonomous agent", "agentic", "multi-agent"],
]

